# FastAPI Backend CI/CD Pipeline
# Railway 배포 (Fly.io 대안은 주석 참조)
#
# 필요한 GitHub Secrets:
#   - RAILWAY_TOKEN: Railway API 토큰
#   - SUPABASE_URL: Supabase 프로젝트 URL
#   - SUPABASE_KEY: Supabase anon key
#
# Fly.io 사용 시 필요한 Secrets:
#   - FLY_API_TOKEN: Fly.io API 토큰

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  PYTHON_VERSION: '3.11'
  WORKING_DIRECTORY: backend

jobs:
  # =========================================================================
  # 1. 정적 분석 & 타입 체크
  # =========================================================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.WORKING_DIRECTORY }}/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

  # =========================================================================
  # 2. 테스트
  # =========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.WORKING_DIRECTORY }}/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing -v || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEBUG: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.WORKING_DIRECTORY }}/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # =========================================================================
  # 3. 보안 스캔
  # =========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-* || true
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # 간단한 시크릿 패턴 검사
          ! grep -rE "(password|secret|api_key|apikey)\s*=\s*['\"][^'\"]+['\"]" . \
            --include="*.py" \
            --exclude-dir=__pycache__ \
            --exclude-dir=.venv || echo "Warning: Possible hardcoded secrets found"
        continue-on-error: true

  # =========================================================================
  # 4. Docker 빌드 & 푸시
  # =========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # 5. Railway 배포
  # =========================================================================
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        run: |
          railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check
        run: |
          sleep 30
          # Railway 배포 URL로 헬스체크
          # curl -f ${{ steps.deploy.outputs.url }}/health || exit 1
          echo "Deployment completed"

  # =========================================================================
  # [대안] Fly.io 배포
  # =========================================================================
  # deploy-flyio:
  #   name: Deploy to Fly.io
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Install Fly CLI
  #       uses: superfly/flyctl-actions/setup-flyctl@master
  #
  #     - name: Deploy to Fly.io
  #       run: flyctl deploy --remote-only
  #       env:
  #         FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  #
  #     - name: Health check
  #       run: |
  #         sleep 30
  #         flyctl status
  #       env:
  #         FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # =========================================================================
  # 6. 배포 알림
  # =========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-railway
    if: always()

    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy-railway.result }}" == "success" ]; then
            echo "✅ Backend deployment successful!"
          else
            echo "❌ Backend deployment failed!"
            exit 1
          fi
