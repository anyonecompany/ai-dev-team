name: La Paz CI

on:
  push:
    branches: [main, 'feat/la-paz-*']
    paths: ['projects/la-paz/**']
  pull_request:
    branches: [main]
    paths: ['projects/la-paz/**']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false
      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/la-paz/frontend/package-lock.json'
      - run: npm ci
        working-directory: projects/la-paz/frontend
      - run: npx eslint . --ext .ts,.tsx --max-warnings 0
        working-directory: projects/la-paz/frontend
      - run: npx tsc --noEmit
        working-directory: projects/la-paz/frontend

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false
      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/la-paz/frontend/package-lock.json'
      - run: npm ci
        working-directory: projects/la-paz/frontend
      - run: npm run build
        working-directory: projects/la-paz/frontend

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false
      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/la-paz/frontend/package-lock.json'
      - run: npm ci
        working-directory: projects/la-paz/frontend
      - run: npx playwright install --with-deps chromium
        working-directory: projects/la-paz/frontend
      - run: npx playwright test
        working-directory: projects/la-paz/frontend
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: projects/la-paz/frontend/test-results/
          retention-days: 7
