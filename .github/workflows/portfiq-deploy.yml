name: Portfiq Backend Deploy

on:
  push:
    branches: [main]
    paths: ['projects/portfiq/backend/**']

concurrency:
  group: portfiq-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    uses: ./.github/workflows/portfiq-backend.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        working-directory: ${{ github.workspace }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service portfiq-backend
        working-directory: projects/portfiq/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check
        if: success()
        run: |
          sleep 30
          curl -f "${{ secrets.RAILWAY_URL }}/health" --max-time 10 \
            && echo "✅ Health check passed" \
            || echo "⚠️ Health check failed — 배포는 성공했으나 서버 응답 없음"

      - name: Notify Slack
        if: always()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            EMOJI="🚀"
            [ "$STATUS" != "success" ] && EMOJI="🔴"
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${EMOJI} Portfiq 백엔드 Railway 배포: ${STATUS}\"}" || true
          fi
