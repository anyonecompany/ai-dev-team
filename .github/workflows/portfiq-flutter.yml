name: Portfiq Flutter CI

on:
  push:
    branches: [main]
    paths: ['projects/portfiq/apps/mobile/**']
  pull_request:
    branches: [main]
    paths: ['projects/portfiq/apps/mobile/**']

concurrency:
  group: portfiq-flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/portfiq/apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            projects/portfiq/apps/mobile/.dart_tool
          key: flutter-pub-${{ hashFiles('projects/portfiq/apps/mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
        continue-on-error: true

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: projects/portfiq/apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            projects/portfiq/apps/mobile/.dart_tool
          key: flutter-pub-${{ hashFiles('projects/portfiq/apps/mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: projects/portfiq/apps/mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 7

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: projects/portfiq/apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            projects/portfiq/apps/mobile/.dart_tool
          key: flutter-pub-macos-${{ hashFiles('projects/portfiq/apps/mobile/pubspec.lock') }}
          restore-keys: flutter-pub-macos-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
