name: Portfiq Flutter CI

on:
  push:
    branches: [main]
    paths: ['projects/portfiq/apps/mobile/**']
  pull_request:
    branches: [main]
    paths: ['projects/portfiq/apps/mobile/**']

concurrency:
  group: portfiq-flutter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/portfiq/apps/mobile
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        working-directory: ${{ github.workspace }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            projects/portfiq/apps/mobile/.dart_tool
          key: flutter-pub-${{ hashFiles('projects/portfiq/apps/mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
        continue-on-error: true

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: projects/portfiq/apps/mobile
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            projects/portfiq/apps/mobile/.dart_tool
          key: flutter-pub-${{ hashFiles('projects/portfiq/apps/mobile/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          cat > android/key.properties << EOF
          storeFile=keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfiq-android-release
          path: |
            projects/portfiq/apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            projects/portfiq/apps/mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload to Play Store (internal)
        if: env.PLAY_STORE_JSON_KEY != ''
        run: |
          cd android
          gem install bundler
          bundle init
          echo "gem 'fastlane'" >> Gemfile
          bundle install
          bundle exec fastlane internal
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}

      - name: Notify Slack
        if: always()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            STATUS="${{ job.status }}"
            EMOJI="📱"
            [ "$STATUS" != "success" ] && EMOJI="🔴"
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${EMOJI} Portfiq Flutter 빌드: ${STATUS}\"}" || true
          fi

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: projects/portfiq/apps/mobile
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Prepare Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
        working-directory: ${{ github.workspace }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            projects/portfiq/apps/mobile/.dart_tool
          key: flutter-pub-macos-${{ hashFiles('projects/portfiq/apps/mobile/pubspec.lock') }}
          restore-keys: flutter-pub-macos-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
