name: La Paz Daily Crawl

on:
  schedule:
    - cron: "0 0 * * *"  # 매일 UTC 00:00
  workflow_dispatch:       # 수동 실행 가능

defaults:
  run:
    working-directory: projects/la-paz

jobs:
  daily-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: projects/la-paz/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily crawl
        run: python scripts/daily_crawl.py
