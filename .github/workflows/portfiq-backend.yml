name: Portfiq Backend CI

on:
  push:
    branches: [main]
    paths: ['projects/portfiq/backend/**']
  pull_request:
    branches: [main]
    paths: ['projects/portfiq/backend/**']
  workflow_call:

concurrency:
  group: portfiq-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/portfiq/backend
    env:
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "ci-dummy-key"
      SUPABASE_SERVICE_KEY: "ci-dummy-service-key"
      ANTHROPIC_API_KEY: "ci-dummy-anthropic-key"
      ENVIRONMENT: "ci"
      DEBUG: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/portfiq/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Format check with ruff
        run: ruff format --check .
        continue-on-error: true

      - name: Python import verification
        run: python -c "import main; print('main.py imports OK')"

      - name: Run pytest
        run: pytest -v --tb=short || echo "No tests found or tests failed"
        continue-on-error: true
